    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Paola - Teachable Machine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        #webcam-container canvas {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto !important;
        }
        .result-label {
            background: white;
            margin-top: 5px;
            padding: 8px;
            border-radius: 5px;
            border-left: 5px solid #0d6efd;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            
            <div class="card shadow-sm p-4 mb-4">
                <h1 class="h3 mb-3 text-primary">SITE PAOLA</h1>
                <p class="text-muted">Modelo de Reconhecimento de Imagem (Teachable Machine)</p>
                
                <button type="button" class="btn btn-primary btn-lg w-100 mb-4" onclick="init()">
                    Iniciar Câmera
                </button>

                <div id="webcam-container" class="d-flex justify-content-center mb-3"></div>

                <div id="label-container" class="text-start"></div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/Hx6iBHPgR/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // Carregar o modelo
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // Configuração da Webcam
        const flip = true; 
        webcam = new tmImage.Webcam(300, 300, flip); // Aumentei um pouco para melhor visibilidade
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Adicionar elementos ao DOM
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // Limpa o container antes de adicionar novos labels (evita duplicatas se clicar iniciar duas vezes)
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.className = "result-label shadow-sm";
            labelContainer.appendChild(div);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</body>
</html>
